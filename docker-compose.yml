services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: slackagent
      POSTGRES_PASSWORD: slackagent
      POSTGRES_DB: slackagent
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

# ponytail: ollama runs on the host (brew), langfuse optional — add services here if you want them containerized

volumes:
  pgdata:

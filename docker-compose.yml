services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
      POSTGRES_DB: swarm
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://swarm:swarm@postgres:5432/langfuse
      NEXTAUTH_SECRET: changeme
      NEXTAUTH_URL: http://localhost:3000
      SALT: changeme
    ports: ["3000:3000"]
    depends_on: [postgres]
    profiles: [observability]  # opt-in; create its DB once: docker compose exec postgres createdb -U swarm langfuse

# ponytail: ollama runs on the host; the app runs on the host too (it drives docker for the
# sandbox — containerizing it means docker-in-docker for no demo value)

volumes:
  pgdata:
